{% extends 'base.html' %}
{% block title %}Depósito{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Realizar Depósito</h4>
                </div>
                <div class="card-body">
                    <p><strong>Saldo Atual:</strong> Kz {{ "%.2f"|format(saldo) }}</p>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="valor" class="form-label">Valor do Depósito (Kz)</label>
                            <input type="number" step="0.01" name="valor" id="valor" class="form-control" min="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-success">Depositar</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Voltar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
