{% extends 'base.html' %}
{% block title %}Editar Usuário{% endblock %}

{% block content %}
<div class="container">
    <h1>Editar Usuário</h1>
    <form method="POST" action="{{ url_for('editar_usuario', id=usuario.id) }}">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input id="nome" name="nome" class="form-control" value="{{ usuario.nome }}" required>
        </div>
        <div class="mb-3">
            <label for="usuario" class="form-label">Login</label>
            <input id="usuario" name="usuario" class="form-control" value="{{ usuario.usuario }}" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Nova Senha (deixe em branco para manter a atual)</label>
            <input type="password" id="senha" name="senha" class="form-control">
        </div>
        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo</label>
            <select id="tipo" name="tipo" class="form-select" required>
                <option value="Admin" {% if usuario.tipo == 'Admin' %}selected{% endif %}>Admin</option>
                <option value="Atendente" {% if usuario.tipo == 'Atendente' %}selected{% endif %}>Atendente</option>
                <option value="Farmaceutica" {% if usuario.tipo == 'Farmaceutica' %}selected{% endif %}>Farmacêutica</option>
                <option value="Gestor" {% if usuario.tipo == 'Gestor' %}selected{% endif %}>Gestor</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
{% endblock %}
