{% extends "base.html" %}

{% block title %}Adicionar Produto{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Adicionar Novo Produto</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('produtos_bp.adicionar_produto') }}">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome do Produto</label>
                            <input type="text" id="nome" name="nome" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label">Categoria</label>
                            <select name="categoria" id="categoria" class="form-select" required>
                                <option value="">-- Selecionar Categoria --</option>
                                <option value="Analgésicos">Analgésicos</option>
                                <option value="Anti-inflamatórios">Anti-inflamatórios</option>
                                <option value="Antibióticos">Antibióticos</option>
                                <option value="Vitaminas e Suplementos">Vitaminas e Suplementos</option>
                                <option value="Higiene e Beleza">Higiene e Beleza</option>
                                <option value="Cuidados com a Pele">Cuidados com a Pele</option>
                                <option value="Saúde Feminina">Saúde Feminina</option>
                                <option value="Saúde Masculina">Saúde Masculina</option>
                                <option value="Bebês e Crianças">Bebês e Crianças</option>
                                <option value="Respiratórios">Respiratórios</option>
                                <option value="Sistema Digestivo">Sistema Digestivo</option>
                                <option value="Cardiovascular">Cardiovascular</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="preco_compra" class="form-label">Preço de Compra (kz)</label>
                                    <input type="number" step="0.01" name="preco_compra" id="preco_compra" class="form-control" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="preco_venda" class="form-label">Preço de Venda (kz)</label>
                                    <input type="number" step="0.01" name="preco_venda" id="preco_venda" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="quantidade" class="form-label">Quantidade</label>
                                    <input type="number" name="quantidade" id="quantidade" class="form-control" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="validade" class="form-label">Data de Validade</label>
                                    <input type="date" name="validade" id="validade" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="fornecedor_id" class="form-label">Fornecedor</label>
                                    <select name="fornecedor_id" id="fornecedor_id" class="form-select" required>
                                        <option value="">-- Selecionar Fornecedor --</option>
                                        {% for fornecedor in fornecedores %}
                                        <option value="{{ fornecedor.id }}">{{ fornecedor.nome }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="data_compra" class="form-label">Data de Compra</label>
                                    <input type="date" name="data_compra" id="data_compra" class="form-control" value="{{ (datetime.now()).strftime('%Y-%m-%d') }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('produtos_bp.listar_produtos') }}" class="btn btn-secondary">Voltar</a>
                            <button type="submit" class="btn btn-success">Salvar Produto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
